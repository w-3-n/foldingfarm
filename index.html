<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Origami - Victorian Puzzle Purse</title>
  </head>
  <body>
    <div id="app"></div>

    <div class="instructions">
        <strong>Controls:</strong><br>
        Left Click + Drag: Rotate View<br>
        Scroll: Zoom
    </div>

    <div id="ui-container">
        <label for="foldSlider"><strong><span id="foldValue">Stage 1 (Sealed)</span></strong></label><br>
        <input type="range" id="foldSlider" min="1" max="3" step="0.01" value="1">
    </div>

    <div id="inventory">
        <div class="inventory-item" draggable="true" data-seed="s1.png">
            <img src="/crops/s1.png" alt="Seed S1" draggable="false">
            <span>Seed S1</span>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
